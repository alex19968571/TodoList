<div class="card-section">
  <!-- Month nav -->
  <div class="d-flex align-items-center justify-content-between mb-3">
    <button class="btn btn-sm btn-outline-secondary" (click)="prevMonth()"><i class="bi bi-chevron-left"></i></button>
    <span class="fw-bold fs-5">{{ monthLabel() }}</span>
    <button class="btn btn-sm btn-outline-secondary" (click)="nextMonth()"><i class="bi bi-chevron-right"></i></button>
  </div>

  <!-- Week headers -->
  <div class="d-grid mb-1" style="grid-template-columns:repeat(7,1fr);">
    @for (h of weekHeaders(); track h) {
      <div class="text-center text-muted small fw-semibold py-1">{{ h }}</div>
    }
  </div>

  <!-- Cells -->
  <div class="d-grid" style="grid-template-columns:repeat(7,1fr);gap:2px;">
    @for (cell of cells(); track cell.date) {
      <div class="p-1 rounded text-center"
           [class.opacity-50]="!cell.inMonth"
           [style.background]="cell.isToday ? 'var(--accent)' : ''"
           [style.color]="cell.isToday ? '#fff' : ''">
        <div class="small">{{ cell.dayNum }}</div>
        @if (cell.taskCount > 0) {
          <div class="rounded-circle mx-auto" style="width:6px;height:6px;background:var(--accent);margin-top:2px;"
               [style.background]="cell.isToday ? '#fff' : 'var(--accent)'"></div>
        }
      </div>
    }
  </div>
</div>
